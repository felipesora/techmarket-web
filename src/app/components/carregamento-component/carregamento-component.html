<div class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-[9999]">
    <div class="flex flex-col items-center gap-5">

            <!-- Spinner -->
            <div class="relative w-16 h-16">
            <!-- Anel de pulso -->
            <span class="absolute inset-0 rounded-full border-2 border-[#0076D2] opacity-0 animate-ping"></span>

            <!-- SVG girando -->
            <svg
                class="w-16 h-16 animate-spin"
                viewBox="0 0 50 50"
                xmlns="http://www.w3.org/2000/svg"
            >
                <!-- Track (trilha de fundo) -->
                <circle
                cx="25" cy="25" r="20"
                fill="none"
                stroke="#0076D2"
                stroke-opacity="0.15"
                stroke-width="3.5"
                />
                <!-- Arco animado -->
                <circle
                cx="25" cy="25" r="20"
                fill="none"
                stroke="#0076D2"
                stroke-width="3.5"
                stroke-linecap="round"
                stroke-dasharray="80 126"
                stroke-dashoffset="0"
                style="filter: drop-shadow(0 0 5px rgba(0,118,210,0.4))"
                />
            </svg>
        </div>

        <!-- Texto -->
        <p class="text-[#0076D2] text-sm font-semibold tracking-widest uppercase animate-pulse">
        Carregando...
        </p>

    </div>
</div>
