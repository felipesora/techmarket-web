@if (carregando) {
    <app-carregamento-component />
}

<main class="bg-[#F5F7FC] p-7 flex flex-col gap-10 min-h-screen">
    <div>
        <div class="flex items-center gap-2">
            <img src="icons/icone-produtos-azul.png" alt="Produtos" class="w-8">
            <h1 class="font-bold text-2xl text-gray-800">Cadastrar Produto</h1>
        </div>
    </div>

    <div class="rounded-[10px] bg-white">
        <form>
            <!-- Informacoes basicas -->
            <div>
                <div class="flex items-center gap-2 bg-[#EFF6FE] p-5 border-b border-[#E9ECEF]">
                    <img src="icons/icone-info.png" alt="ícone de Informação" class="w-7">
                    <h2 class="font-bold">Informações Básicas</h2>
                </div>

                <div class="p-5 flex flex-col gap-5">

                    <div class="flex items-center justify-between gap-7">

                        <div class="flex w-full flex-col gap-1">
                            <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Código do Produto <span class="text-red-600">*</span></label>
                            <input
                                formControlName="nome"
                                name="nome"
                                type="text"
                                placeholder="Ex: PROD-001"
                                class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                            >
                        </div>

                        <div class="flex w-full flex-col gap-1">
                            <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Categoria <span class="text-red-600">*</span></label>
                            <select 
                                name="categoria" 
                                id="categoria"
                                class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                            >
                                <option value="" disabled>Selecione uma categoria</option>
                                <option value="NOTEBOOKS">Notebooks</option>
                                <option value="CELULARES">Celulares</option>
                                <option value="COMPUTADORES">Computadores</option>
                                <option value="MONITORES">Monitores</option>
                                <option value="TECLADOS">Teclados</option>
                                <option value="MOUSES">Mouses</option>
                                <option value="HEADSETS">Headsets</option>
                                <option value="PERIFERICOS">Periféricos</option>
                                <option value="WEBCAMS">Webcams</option>
                                <option value="COMPONENTES">Componentes</option>
                                <option value="AUDIO">Áudio</option>
                                <option value="OUTROS">Outros</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex w-full flex-col gap-1">
                        <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Nome do Produto <span class="text-red-600">*</span></label>
                        <input
                            formControlName="nome"
                            name="nome"
                            type="text"
                            placeholder="Digite o nome do produto"
                            class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                        >
                    </div>

                    <div class="flex w-full flex-col gap-1">
                        <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Descrição</label>
                        <textarea 
                            name="descricao" 
                            id="descricao"
                            placeholder="Descreva o produto (características, especificações, etc.)"
                            class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                        ></textarea>
                    </div>
                </div>
            </div>

            <!-- Preços e Estoque -->
            <div>
                <div class="flex items-center gap-2 bg-[#F0FDF4] p-5 border-b border-[#E9ECEF]">
                    <img src="icons/icone-dinheiro-verde.png" alt="ícone de Informação" class="w-7">
                    <h2 class="font-bold">Preços e Estoque</h2>
                </div>

                <div class="p-5 flex flex-col gap-5">

                    <div class="flex items-center justify-between gap-7">

                        <div class="flex w-full flex-col gap-1">
                            <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Preço Normal <span class="text-red-600">*</span></label>
                            <input
                                formControlName="nome"
                                name="nome"
                                type="text"
                                placeholder="R$ 0,00"
                                class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                            >
                        </div>

                        <div class="flex w-full flex-col gap-1">
                            <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Preço Promocional</label>
                            <input
                                formControlName="nome"
                                name="nome"
                                type="text"
                                placeholder="R$ 0,00"
                                class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                            >
                        </div>

                        <div class="flex w-full flex-col gap-1">
                            <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Quantidade em Estoque <span class="text-red-600">*</span></label>
                            <input
                                formControlName="nome"
                                name="nome"
                                type="text"
                                placeholder="0"
                                class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                            >
                        </div>
                    </div>
                </div>
            </div>

            <!-- Marca e Status -->
            <div>
                <div class="flex items-center gap-2 bg-[#FAF5FF] p-5 border-b border-[#E9ECEF]">
                    <img src="icons/icone-etiqueta-roxo.png" alt="ícone de Informação" class="w-7">
                    <h2 class="font-bold">Marca e Status</h2>
                </div>

                <div class="p-5 flex flex-col gap-5">

                    <div class="flex items-center justify-between gap-7">

                        <div class="flex w-full flex-col gap-1">
                            <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Marca do Produto <span class="text-red-600">*</span></label>
                            <input
                                formControlName="nome"
                                name="nome"
                                type="text"
                                placeholder="Ex: Samsung"
                                class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                            >
                        </div>

                        <div class="flex w-full flex-col gap-1">
                            <label for="nome" class="text-[#334155] font-bold text-sm pl-1">Status <span class="text-red-600">*</span></label>
                            <select 
                                name="categoria" 
                                id="categoria"
                                class="border border-[#E2E8F0] rounded-[10px] py-2 px-4 text-sm transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
                            >
                                <option value="" disabled>Selecione um status</option>
                                <option value="ATIVO">Ativo</option>
                                <option value="INATIVO">Inativo</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Imagem do Produto -->
            <div>
                <div class="flex items-center gap-2 bg-[#FFFAF3] p-5 border-b border-[#E9ECEF]">
                    <img src="icons/icone-imagem-amarelo.png" alt="ícone de Informação" class="w-7">
                    <h2 class="font-bold">Imagem do Produto</h2>
                </div>

            </div>

            <!-- Botões -->
            <div class="flex items-center gap-3 justify-end p-5">
                <button type="button" routerLink="/admin/produtos" class="cursor-pointer bg-gray-100 text-gray-600 text-sm flex items-center border border-gray-200 px-6 py-3 rounded-lg font-medium hover:bg-gray-200 transition-all">
                    Cancelar
                </button>

                <button type="submit" class="cursor-pointer bg-[#0076D2] text-sm text-white px-6 py-3 rounded-lg font-medium hover:bg-[#005fa8] transition-all flex items-center gap-2 hover:shadow-sm">
                    <img src="icons/icone-cadastrar.png" alt="Adicionar" class="w-6">
                    Cadastrar Produto
                </button>
            </div>
        </form>
    </div>
</main>
