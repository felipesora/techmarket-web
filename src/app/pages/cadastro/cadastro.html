<div class="bg-white rounded-[10px] shadow-md flex flex-col items-center max-w-[480px] w-full">

    <button routerLink="/" class="cursor-pointer">
        <img src="images/logo-techmarket.png" alt="Logo TechMarket" class="w-36 py-5">
    </button>

    <div class="bg-[#E9ECEF] h-[0.5px] w-full"></div>

    <div class="p-8 flex flex-col items-center gap-5">

        <h1 class="font-bold text-2xl">Criar nova conta</h1>

        <div class="flex flex-col w-full gap-1">
            <label for="nome" class="text-[#334155] font-bold text-sm">Nome</label>
            <input 
                name="nome"
                type="text"
                placeholder="Seu nome completo"
                class="border border-[#E2E8F0] rounded-[10px] py-3.5 px-4 text-[15px] transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
            >
        </div>

        <div class="flex flex-col w-full gap-1">
            <label for="email" class="text-[#334155] font-bold text-sm">E-mail</label>
            <input 
                name="email"
                type="email"
                placeholder="exemplo@techmarket.com.br"
                class="border border-[#E2E8F0] rounded-[10px] py-3.5 px-4 text-[15px] transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
            >
        </div>

        <div class="flex flex-col w-full gap-1">
            <label for="senha" class="text-[#334155] font-bold text-sm">Senha</label>

            <div class="relative w-full">
                <input 
                    name="senha"
                    [type]="mostrarSenha ? 'text' : 'password'"
                    placeholder="••••••••"
                    class="border border-[#E2E8F0] rounded-[10px] py-3.5 px-4 pr-12 text-[15px] 
                        transition-all duration-300 
                        focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none
                        w-full"
                >

                @if (!mostrarSenha) {
                    <button (click)="toggleSenha()" class="group absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer">
                        <img src="icons/icone-invisivel-cinza.png" class="w-5 group-hover:hidden">
                        <img src="icons/icone-invisivel-azul.png" class="w-5 hidden group-hover:block">
                    </button>
                } @else {
                    <button (click)="toggleSenha()" class="group absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer">
                        <img src="icons/icone-visivel-cinza.png" class="w-5 group-hover:hidden">
                        <img src="icons/icone-visivel-azul.png" class="w-5 hidden group-hover:block">
                    </button>
                }
            </div>
        </div>

        <div class="flex flex-col w-full gap-1">
            <label for="confirmarSenha" class="text-[#334155] font-bold text-sm">Confirmar senha</label>
            <input 
                name="confirmarSenha"
                type="password"
                placeholder="••••••••"
                class="border border-[#E2E8F0] rounded-[10px] py-3.5 px-4 text-[15px] transition-all duration-300 focus:border-[#0076D2] focus:ring-3 focus:ring-[#0076D2]/10 focus:outline-none"
            >
        </div>

        <button class="bg-[#0076D2] text-white font-bold w-full py-4 rounded-[10px] cursor-pointer hover:bg-[#002158] transition-all duration-300">
            Criar minha conta
        </button>

        <div class="flex items-center gap-2 w-full">
            <div class="bg-[#E9ECEF] h-px flex-1"></div>
            <p class="text-[12px] text-[#64748B]">OU</p>
            <div class="bg-[#E9ECEF] h-px flex-1"></div>
        </div>

        <button routerLink="/auth/login" class="border border-[#0076D2] bg-transparent text-[#0076D2] font-bold w-full py-4 rounded-[10px] cursor-pointer hover:text-[#002158] hover:border-[#002158] hover:bg-[#F0F9FF] transition-all duration-300">
            Já tenho uma conta
        </button>

        <div class="flex flex-col items-center">
            <p class="text-[10px] text-[#64748B] text-center">Ao criar uma conta, você concorda com nossos <span class="text-[#0076D2] cursor-pointer hover:underline">Termos de Uso</span> e <span class="text-[#0076D2] cursor-pointer hover:underline">Política de Privacidade</span>.</p>
            <p class="text-[10px] text-[#64748B] text-center">Ambiente seguro — seus dados estão protegidos.</p>
        </div>

    </div>

</div>
