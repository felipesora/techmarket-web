<main class="bg-[#F5F7FC] p-7 min-h-screen">
    <div class="bg-white rounded-lg shadow-sm overflow-hidden p-5">
        <div class="p-8 flex flex-col items-center gap-6">

            <img src="images/nao-encontrado.png" alt="Página não encontrada" class="w-[300px]">

            <div class="flex flex-col items-center gap-2">
                <h1 class="text-6xl font-bold text-gray-800">404</h1>
                <h2 class="text-2xl font-bold text-gray-800">Página não encontrada</h2>
            </div>
            
            <div class="bg-[#0076D2]/10 p-4 rounded flex flex-col items-center justify-center">
                <p class="text-[#0076D2] text-sm font-medium mb-2">
                    Oops! Página não encontrada
                </p>
                <p class="text-gray-600 text-sm text-center">
                    A página que você está tentando acessar não existe ou foi movida.
                    Verifique o endereço ou navegue para outra área do sistema.
                </p>
            </div>

            <div class="bg-gray-50 rounded-lg p-4">
                <div class="flex items-center justify-center gap-2 text-sm text-gray-600">
                    <img src="icons/icone-info.png" alt="Info" class="w-5 h-5">
                    <span>Se o problema persistir, entre em contato com o suporte</span>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <button [routerLink]="getPerfilUsuario() === 'ADMINISTRADOR' ? '/admin/dashboard' : '/'" class="cursor-pointer flex items-center justify-center gap-2 px-6 py-3 bg-[#0076D2] text-white rounded-lg font-medium hover:bg-[#005fa8] transition-all duration-300">
                    Voltar para a Home
                </button>

                @if (!isUsuarioLogado()) {
                    <button routerLink="/auth/login" class="cursor-pointer flex items-center justify-center gap-2 px-6 py-3 bg-white border-2 border-[#0076D2] text-[#0076D2] rounded-lg font-medium hover:bg-[#0076D2] hover:text-white transition-all duration-300">
                        Fazer Login
                    </button>
                }
            </div>
        </div>
    </div>
</main>
